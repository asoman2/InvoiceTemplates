<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIA Interactive Case Study: Project Execution & WIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        .chart-wrapper {
            position: relative; width: 100%; max-width: 900px; margin: 0 auto;
            height: 300px; max-height: 350px;
        }
        @media (min-width: 768px) { .chart-wrapper { height: 350px; } }

        .phase-btn { transition: all 0.3s ease; position: relative; overflow: hidden; }
        .phase-btn.active { background-color: #2563eb; color: white; border-color: #2563eb; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.3); }
        .phase-btn:not(.active):hover { background-color: #e2e8f0; }
        
        .persona-btn { transition: all 0.2s ease; border-bottom: 3px solid transparent; }
        .persona-btn.active { border-bottom-color: #2563eb; color: #2563eb; font-weight: 700; background-color: #eff6ff; }
        .persona-btn:not(.active):hover { background-color: #f1f5f9; border-bottom-color: #cbd5e1; }

        .data-card { transition: transform 0.2s; }
        .data-card:hover { transform: translateY(-2px); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased selection:bg-blue-200 selection:text-blue-900">

    <header class="bg-slate-900 text-white shadow-xl z-50 relative">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-blue-600 rounded flex items-center justify-center font-black text-xl shadow-inner">🏗️</div>
                <div>
                    <h1 class="text-sm font-bold tracking-tight">Neon Apex Tower Project</h1>
                    <p class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">AIA Billing & WIP Lifecycle Simulation</p>
                </div>
            </div>
            <div class="hidden md:flex items-center gap-6 text-xs font-mono bg-slate-800 px-4 py-2 rounded-lg border border-slate-700">
                <div><span class="text-slate-400">Total Contract:</span> <span class="font-bold text-emerald-400">$5,000,000</span></div>
                <div class="w-px h-4 bg-slate-600"></div>
                <div><span class="text-slate-400">Standard Retainage:</span> <span class="font-bold text-amber-400">10%</span></div>
            </div>
        </div>
    </header>

    <main class="flex-1 flex flex-col max-w-7xl mx-auto w-full">
        
        <section class="px-6 py-8 border-b border-slate-200 bg-white">
            <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 text-center">Select Project Phase (Time)</h2>
            <div class="flex flex-col md:flex-row justify-center items-center gap-4 max-w-4xl mx-auto relative">
                <div class="hidden md:block absolute top-1/2 left-10 right-10 h-1 bg-slate-200 -z-10 -translate-y-1/2"></div>
                
                <button onclick="app.setPhase(1)" id="btn-phase-1" class="phase-btn active w-full md:w-1/3 bg-white border-2 border-slate-300 text-slate-700 py-3 px-4 rounded-xl font-bold text-sm z-10">
                    Phase 1: Foundation<br><span class="text-[10px] font-normal opacity-80">Month 1 • App #01</span>
                </button>
                <button onclick="app.setPhase(2)" id="btn-phase-2" class="phase-btn w-full md:w-1/3 bg-white border-2 border-slate-300 text-slate-700 py-3 px-4 rounded-xl font-bold text-sm z-10">
                    Phase 2: Superstructure<br><span class="text-[10px] font-normal opacity-80">Month 3 • App #03</span>
                </button>
                <button onclick="app.setPhase(3)" id="btn-phase-3" class="phase-btn w-full md:w-1/3 bg-white border-2 border-slate-300 text-slate-700 py-3 px-4 rounded-xl font-bold text-sm z-10">
                    Phase 3: Substantial Comp.<br><span class="text-[10px] font-normal opacity-80">Month 6 • App #06</span>
                </button>
            </div>
        </section>

        <section class="bg-slate-50 border-b border-slate-200 px-6 pt-4 flex justify-center">
            <div class="flex space-x-2 md:space-x-6 overflow-x-auto custom-scroll pb-2">
                <button onclick="app.setPersona('owner')" id="btn-pers-owner" class="persona-btn active px-4 py-3 text-sm font-medium text-slate-600 flex items-center gap-2 whitespace-nowrap">
                    <span class="text-lg">🏢</span> Owner (Client)
                </button>
                <button onclick="app.setPersona('architect')" id="btn-pers-architect" class="persona-btn px-4 py-3 text-sm font-medium text-slate-600 flex items-center gap-2 whitespace-nowrap">
                    <span class="text-lg">✍️</span> Architect (Approver)
                </button>
                <button onclick="app.setPersona('subcontractor')" id="btn-pers-subcontractor" class="persona-btn px-4 py-3 text-sm font-medium text-slate-600 flex items-center gap-2 whitespace-nowrap">
                    <span class="text-lg">👷</span> Subcontractor
                </button>
                <div class="w-px h-8 bg-slate-300 my-auto hidden md:block"></div>
                <button onclick="app.setPersona('coordinator')" id="btn-pers-coordinator" class="persona-btn px-4 py-3 text-sm font-medium text-slate-600 flex items-center gap-2 whitespace-nowrap">
                    <span class="text-lg">📈</span> Internal Coordinator (WIP)
                </button>
            </div>
        </section>

        <section id="content-area" class="flex-1 p-6 md:p-10 bg-slate-50 overflow-y-auto custom-scroll">
            </section>

    </main>

    <script>
        // --- 1. The Single Source of Truth Database ---
        // Enhanced to include 'cost' data to demonstrate WIP (Work in Progress) capabilities.
        const projectDB = {
            totalContract: 5000000,
            estTotalCost: 4000000, // Targeting a 20% Gross Margin
            phases: {
                1: {
                    title: "Month 1: Site Prep & Foundation",
                    desc: "The project has just begun. Site work is complete, and foundations are halfway poured.",
                    retainageRule: "10% Standard",
                    g702: {
                        contractSum: 5000000, netChanges: 0, totalCompleted: 750000,
                        retainage: 75000, lessPrevious: 0, currentDue: 675000, balanceToFinish: 4250000
                    },
                    internalWIP: { actualCostsToDate: 560000, estimatedCostAtCompletion: 4000000 },
                    g703: [
                        { id: '01', desc: 'General Conditions', scheduled: 500000, prev: 0, current: 50000, percent: 10, ret: 5000, cost: 45000 },
                        { id: '02', desc: 'Site Work & Excavation', scheduled: 400000, prev: 0, current: 400000, percent: 100, ret: 40000, cost: 310000 },
                        { id: '03', desc: 'Concrete Foundation', scheduled: 600000, prev: 0, current: 300000, percent: 50, ret: 30000, cost: 205000 },
                        { id: '04', desc: 'Structural Steel (Sub)', scheduled: 1500000, prev: 0, current: 0, percent: 0, ret: 0, cost: 0 },
                        { id: '05', desc: 'MEP Rough-ins (Sub)', scheduled: 1000000, prev: 0, current: 0, percent: 0, ret: 0, cost: 0 },
                        { id: '06', desc: 'Finishes', scheduled: 1000000, prev: 0, current: 0, percent: 0, ret: 0, cost: 0 }
                    ]
                },
                2: {
                    title: "Month 3: Superstructure & Framing",
                    desc: "Foundations are complete. The steel subcontractor is heavily active, and MEP rough-ins have begun. A Change Order was added.",
                    retainageRule: "10% Standard",
                    g702: {
                        contractSum: 5000000, netChanges: 50000, totalCompleted: 2750000,
                        retainage: 275000, lessPrevious: 675000, currentDue: 1800000, balanceToFinish: 2300000
                    },
                    internalWIP: { actualCostsToDate: 2350000, estimatedCostAtCompletion: 4040000 },
                    g703: [
                        { id: '01', desc: 'General Conditions', scheduled: 500000, prev: 50000, current: 150000, percent: 40, ret: 20000, cost: 160000 },
                        { id: '02', desc: 'Site Work & Excavation', scheduled: 400000, prev: 400000, current: 0, percent: 100, ret: 40000, cost: 310000 },
                        { id: '03', desc: 'Concrete Foundation', scheduled: 600000, prev: 300000, current: 300000, percent: 100, ret: 60000, cost: 460000 },
                        { id: '04', desc: 'Structural Steel (Sub)', scheduled: 1500000, prev: 0, current: 1200000, percent: 80, ret: 120000, cost: 1050000 },
                        { id: '05', desc: 'MEP Rough-ins (Sub)', scheduled: 1000000, prev: 0, current: 300000, percent: 30, ret: 30000, cost: 230000 },
                        { id: '06', desc: 'Finishes', scheduled: 1000000, prev: 0, current: 0, percent: 0, ret: 0, cost: 0 },
                        { id: 'CO1', desc: 'CO-1: Added Reinforcement', scheduled: 50000, prev: 0, current: 50000, percent: 100, ret: 5000, cost: 40000 }
                    ]
                },
                3: {
                    title: "Month 6: Substantial Completion",
                    desc: "Project is substantially complete. The Architect has approved reducing total retainage held from 10% down to 5%.",
                    retainageRule: "Reduced to 5% Total",
                    g702: {
                        contractSum: 5000000, netChanges: 50000, totalCompleted: 4900000,
                        retainage: 245000, lessPrevious: 2475000, currentDue: 2180000, balanceToFinish: 150000
                    },
                    internalWIP: { actualCostsToDate: 4150000, estimatedCostAtCompletion: 4080000 }, // Slight cost overrun
                    g703: [
                        { id: '01', desc: 'General Conditions', scheduled: 500000, prev: 200000, current: 300000, percent: 100, ret: 25000, cost: 480000 },
                        { id: '02', desc: 'Site Work & Excavation', scheduled: 400000, prev: 400000, current: 0, percent: 100, ret: 20000, cost: 310000 },
                        { id: '03', desc: 'Concrete Foundation', scheduled: 600000, prev: 600000, current: 0, percent: 100, ret: 30000, cost: 460000 },
                        { id: '04', desc: 'Structural Steel (Sub)', scheduled: 1500000, prev: 1200000, current: 300000, percent: 100, ret: 75000, cost: 1300000 },
                        { id: '05', desc: 'MEP Rough-ins (Sub)', scheduled: 1000000, prev: 300000, current: 700000, percent: 100, ret: 50000, cost: 820000 },
                        { id: '06', desc: 'Finishes', scheduled: 1000000, prev: 0, current: 900000, percent: 90, ret: 45000, cost: 740000 },
                        { id: 'CO1', desc: 'CO-1: Added Reinforcement', scheduled: 50000, prev: 50000, current: 0, percent: 100, ret: 2500, cost: 40000 }
                    ]
                }
            }
        };

        const app = {
            state: { phase: 1, persona: 'owner' },
            formatCurrency: (num) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(num),

            init() {
                this.render();
            },

            setPhase(p) {
                this.state.phase = p;
                [1,2,3].forEach(i => document.getElementById(`btn-phase-${i}`).classList.remove('active'));
                document.getElementById(`btn-phase-${p}`).classList.add('active');
                this.render();
            },

            setPersona(pers) {
                this.state.persona = pers;
                ['owner', 'architect', 'subcontractor', 'coordinator'].forEach(p => document.getElementById(`btn-pers-${p}`).classList.remove('active'));
                document.getElementById(`btn-pers-${pers}`).classList.add('active');
                this.render();
            },

            render() {
                const container = document.getElementById('content-area');
                const phaseData = projectDB.phases[this.state.phase];
                let html = '';

                // Context Header
                html += `
                    <div class="max-w-5xl mx-auto mb-8 bg-white p-6 rounded-xl border border-slate-200 shadow-sm animate-fade-in">
                        <h3 class="text-lg font-black text-slate-800 mb-2">${phaseData.title}</h3>
                        <p class="text-sm text-slate-600 leading-relaxed mb-3">${phaseData.desc}</p>
                `;

                if (this.state.persona === 'owner') {
                    html += `<div class="bg-blue-50 border-l-4 border-blue-500 p-3 rounded-r"><p class="text-xs text-blue-800 font-medium"><strong>Owner Context:</strong> Owners focus on high-level financial health. They rely on the G702 cover sheet summary to understand capital deployment, retainage withheld as security, and remaining budget to finish.</p></div></div>`;
                    html += this.renderOwnerView(phaseData);
                } else if (this.state.persona === 'architect') {
                    html += `<div class="bg-emerald-50 border-l-4 border-emerald-500 p-3 rounded-r"><p class="text-xs text-emerald-800 font-medium"><strong>Architect Context:</strong> Architects must certify the invoice. They scrutinize the G703 Continuation Sheet line-by-line to ensure the % billed matches physical reality on site before legally signing off.</p></div></div>`;
                    html += this.renderArchitectView(phaseData);
                } else if (this.state.persona === 'subcontractor') {
                    html += `<div class="bg-slate-100 border-l-4 border-slate-500 p-3 rounded-r"><p class="text-xs text-slate-800 font-medium"><strong>Subcontractor Context:</strong> Subcontractors only care about their specific scope. Enterprise RBAC sandboxes their view, ensuring they only see their assigned SOV line item to input their progress.</p></div></div>`;
                    html += this.renderSubcontractorView(phaseData);
                } else if (this.state.persona === 'coordinator') {
                    html += `<div class="bg-purple-50 border-l-4 border-purple-500 p-3 rounded-r"><p class="text-xs text-purple-800 font-medium"><strong>Internal Coordinator Context:</strong> The crucial link between external billing (Revenue) and internal job costing. They track Work-In-Progress (WIP) to ensure the project is not "Underbilled" (bleeding cash) and that gross margins are maintained.</p></div></div>`;
                    html += this.renderCoordinatorView(phaseData);
                }

                container.innerHTML = html;

                // Render respective charts after DOM paints
                setTimeout(() => {
                    if (this.state.persona === 'owner') this.renderOwnerChart(phaseData);
                    if (this.state.persona === 'coordinator') this.renderCoordinatorChart(phaseData);
                }, 50);
            },

            // --- PERSONA VIEWS ---

            renderOwnerView(data) {
                const g702 = data.g702;
                return `
                    <div class="max-w-5xl mx-auto animate-fade-in space-y-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                            <div class="data-card bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Adjusted Contract Sum</p>
                                <h4 class="text-2xl font-black text-slate-800">${this.formatCurrency(g702.contractSum + g702.netChanges)}</h4>
                                <p class="text-xs text-slate-500 mt-1">Includes ${this.formatCurrency(g702.netChanges)} in COs.</p>
                            </div>
                            <div class="data-card bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Completed to Date</p>
                                <h4 class="text-2xl font-black text-blue-600">${this.formatCurrency(g702.totalCompleted)}</h4>
                                <p class="text-xs text-slate-500 mt-1">${((g702.totalCompleted / (g702.contractSum + g702.netChanges)) * 100).toFixed(1)}% of total project.</p>
                            </div>
                            <div class="data-card bg-amber-50 p-5 rounded-xl border border-amber-200 shadow-sm">
                                <p class="text-[10px] font-black text-amber-700 uppercase tracking-widest mb-1">Less Retainage Held</p>
                                <h4 class="text-2xl font-black text-amber-700">(${this.formatCurrency(g702.retainage)})</h4>
                                <p class="text-[10px] font-bold bg-amber-200 text-amber-900 inline-block px-1.5 rounded mt-1">${data.retainageRule}</p>
                            </div>
                            <div class="data-card bg-emerald-50 p-5 rounded-xl border border-emerald-200 shadow-md">
                                <p class="text-[10px] font-black text-emerald-700 uppercase tracking-widest mb-1">Current Payment Due</p>
                                <h4 class="text-3xl font-black text-emerald-700">${this.formatCurrency(g702.currentDue)}</h4>
                                <p class="text-xs text-emerald-600 mt-1">After deducting prev. payments.</p>
                            </div>
                        </div>

                        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="text-sm font-bold text-slate-800">Financial Progression (G703 Rollup)</h3>
                                <button class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-1.5 rounded text-xs font-bold transition">Export AIA PDF</button>
                            </div>
                            <div class="chart-wrapper">
                                <canvas id="ownerChart"></canvas>
                            </div>
                        </div>
                    </div>
                `;
            },

            renderArchitectView(data) {
                let tableRows = data.g703.map(row => `
                    <tr class="border-b border-slate-100 hover:bg-slate-50 transition">
                        <td class="py-3 px-3 font-mono text-slate-500">${row.id}</td>
                        <td class="py-3 px-3 font-medium text-slate-800">${row.desc}</td>
                        <td class="py-3 px-3 text-right font-mono text-slate-600">${this.formatCurrency(row.scheduled)}</td>
                        <td class="py-3 px-3 text-right font-mono text-slate-600">${this.formatCurrency(row.prev)}</td>
                        <td class="py-3 px-3 text-right font-mono text-blue-700 font-bold bg-blue-50/30">${this.formatCurrency(row.current)}</td>
                        <td class="py-3 px-3 text-center">
                            <span class="inline-block px-2 py-1 rounded ${row.percent === 100 ? 'bg-emerald-100 text-emerald-800' : 'bg-slate-100 text-slate-700'} font-bold text-xs">${row.percent}%</span>
                        </td>
                        <td class="py-3 px-3 text-right font-mono text-amber-600">${this.formatCurrency(row.ret)}</td>
                    </tr>
                `).join('');

                return `
                    <div class="max-w-5xl mx-auto animate-fade-in space-y-6">
                        <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                            <div class="bg-slate-800 p-4 flex justify-between items-center text-white">
                                <h3 class="font-bold text-sm tracking-wider uppercase">G703 Continuation Sheet - Architect Review</h3>
                                <div class="flex gap-3">
                                    <button class="bg-rose-500 hover:bg-rose-600 px-4 py-1.5 rounded text-xs font-bold transition shadow-sm">Reject Line Item</button>
                                    <button class="bg-emerald-500 hover:bg-emerald-600 px-4 py-1.5 rounded text-xs font-bold transition shadow-sm flex items-center gap-2"><span>✍️</span> Certify Payment</button>
                                </div>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left text-sm whitespace-nowrap">
                                    <thead class="bg-slate-50 border-b border-slate-200 text-xs uppercase font-black text-slate-500">
                                        <tr>
                                            <th class="py-4 px-3">Item</th>
                                            <th class="py-4 px-3">Description of Work</th>
                                            <th class="py-4 px-3 text-right">Scheduled Value</th>
                                            <th class="py-4 px-3 text-right">Prev Billed</th>
                                            <th class="py-4 px-3 text-right text-blue-700">This Period</th>
                                            <th class="py-4 px-3 text-center">% Done</th>
                                            <th class="py-4 px-3 text-right text-amber-700">Retainage Held</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-100">
                                        ${tableRows}
                                    </tbody>
                                    <tfoot class="bg-slate-100 font-bold border-t-2 border-slate-300">
                                        <tr>
                                            <td colspan="2" class="py-4 px-3 text-right text-slate-700 uppercase">Totals:</td>
                                            <td class="py-4 px-3 text-right font-mono">${this.formatCurrency(data.g702.contractSum + data.g702.netChanges)}</td>
                                            <td class="py-4 px-3 text-right font-mono">${this.formatCurrency(data.g702.totalCompleted - data.g703.reduce((acc, r) => acc + r.current, 0))}</td>
                                            <td class="py-4 px-3 text-right font-mono text-blue-700">${this.formatCurrency(data.g703.reduce((acc, r) => acc + r.current, 0))}</td>
                                            <td class="py-4 px-3 text-center text-emerald-700">${((data.g702.totalCompleted / (data.g702.contractSum + data.g702.netChanges)) * 100).toFixed(1)}%</td>
                                            <td class="py-4 px-3 text-right font-mono text-amber-700">${this.formatCurrency(data.g702.retainage)}</td>
                                        </tr>
                                    </tfoot>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            },

            renderSubcontractorView(data) {
                const subData = data.g703.find(r => r.id === '04'); // Steel Sub
                const isComplete = subData.percent === 100;
                
                return `
                    <div class="max-w-3xl mx-auto animate-fade-in space-y-6">
                        <div class="bg-white border-t-4 border-blue-600 rounded-xl shadow-md p-8">
                            <div class="flex justify-between items-start mb-8 border-b border-slate-100 pb-4">
                                <div>
                                    <h2 class="text-2xl font-black text-slate-900">SteelCore Framing LLC</h2>
                                    <p class="text-sm text-slate-500 mt-1">Vendor Portal • Neon Apex Tower</p>
                                </div>
                                <span class="bg-blue-100 text-blue-800 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest">Sandboxed View</span>
                            </div>

                            <div class="grid grid-cols-2 gap-6 mb-8">
                                <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Your Total Contract</p>
                                    <p class="text-xl font-mono font-bold text-slate-800">${this.formatCurrency(subData.scheduled)}</p>
                                </div>
                                <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Previously Billed</p>
                                    <p class="text-xl font-mono font-bold text-slate-800">${this.formatCurrency(subData.prev)}</p>
                                </div>
                            </div>

                            <div class="bg-blue-50 border border-blue-200 rounded-xl p-6 mb-8">
                                <h3 class="text-sm font-bold text-blue-900 mb-4">Application for Current Period</h3>
                                <div class="flex items-center gap-6">
                                    <div class="flex-1">
                                        <label class="block text-xs font-bold text-slate-700 mb-2">Enter % Complete to Date:</label>
                                        <div class="relative">
                                            <input type="number" ${isComplete ? 'disabled' : ''} class="w-full border border-slate-300 rounded-lg p-3 text-lg font-bold text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none ${isComplete ? 'bg-slate-100 text-slate-500' : 'bg-white'}" value="${subData.percent}">
                                            <span class="absolute right-4 top-1/2 transform -translate-y-1/2 font-bold text-slate-400">%</span>
                                        </div>
                                    </div>
                                    <div class="text-3xl text-slate-300">➔</div>
                                    <div class="flex-1">
                                        <label class="block text-xs font-bold text-slate-700 mb-2">Calculated Value Earned:</label>
                                        <div class="border border-transparent p-3 text-2xl font-mono font-bold text-emerald-600">
                                            ${this.formatCurrency((subData.percent / 100) * subData.scheduled)}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="flex justify-between items-center pt-6 border-t border-slate-100">
                                <div class="text-xs text-amber-600 font-bold bg-amber-50 px-3 py-1.5 rounded">
                                    Retainage currently withheld by GC: ${this.formatCurrency(subData.ret)}
                                </div>
                                <button class="${isComplete ? 'bg-slate-300 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'} text-white px-8 py-3 rounded-lg text-sm font-bold shadow-md transition">
                                    ${isComplete ? 'Fully Billed' : 'Submit Progress to GC'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            },

            renderCoordinatorView(data) {
                const wip = data.internalWIP;
                const earnedRev = data.g702.totalCompleted;
                const costVariance = earnedRev - wip.actualCostsToDate;
                const isUnderbilled = costVariance < 0;
                const currentMargin = ((earnedRev - wip.actualCostsToDate) / earnedRev) * 100 || 0;

                return `
                    <div class="max-w-5xl mx-auto animate-fade-in space-y-8">
                        
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div class="data-card bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Actual Costs to Date</p>
                                <h4 class="text-2xl font-black text-purple-700">${this.formatCurrency(wip.actualCostsToDate)}</h4>
                                <p class="text-xs text-slate-500 mt-1">Est. at Completion: ${this.formatCurrency(wip.estimatedCostAtCompletion)}</p>
                            </div>
                            <div class="data-card bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Earned Revenue (Billed)</p>
                                <h4 class="text-2xl font-black text-emerald-600">${this.formatCurrency(earnedRev)}</h4>
                                <p class="text-xs text-slate-500 mt-1">Via G702 Total Completed</p>
                            </div>
                            <div class="data-card ${isUnderbilled ? 'bg-rose-50 border-rose-200' : 'bg-blue-50 border-blue-200'} p-5 rounded-xl border shadow-sm">
                                <div class="flex justify-between items-start">
                                    <p class="text-[10px] font-black ${isUnderbilled ? 'text-rose-700' : 'text-blue-700'} uppercase tracking-widest mb-1">Billing Status</p>
                                    <span class="text-xs font-bold ${isUnderbilled ? 'bg-rose-200 text-rose-900' : 'bg-blue-200 text-blue-900'} px-2 py-0.5 rounded">${isUnderbilled ? 'Underbilled' : 'Overbilled'}</span>
                                </div>
                                <h4 class="text-2xl font-black ${isUnderbilled ? 'text-rose-700' : 'text-blue-700'}">${this.formatCurrency(Math.abs(costVariance))}</h4>
                                <p class="text-xs ${isUnderbilled ? 'text-rose-600' : 'text-blue-600'} mt-1 font-medium">Current Margin: ${currentMargin.toFixed(1)}%</p>
                            </div>
                        </div>

                        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                            <div class="flex justify-between items-center mb-4">
                                <div>
                                    <h3 class="text-sm font-bold text-slate-800">Line-Item Cost vs Revenue (WIP)</h3>
                                    <p class="text-xs text-slate-500">Tracking margin fade across the SOV.</p>
                                </div>
                            </div>
                            <div class="chart-wrapper">
                                <canvas id="coordinatorChart"></canvas>
                            </div>
                        </div>
                    </div>
                `;
            },

            // --- CHART.JS RENDERING ---
            renderOwnerChart(data) {
                const canvas = document.getElementById('ownerChart');
                if(!canvas) return;
                const ctx = canvas.getContext('2d');

                if (window.ownerChartInstance) window.ownerChartInstance.destroy();

                const labels = data.g703.map(row => row.desc.substring(0,15) + '...');
                const prevBilled = data.g703.map(r => r.prev);
                const currentBilled = data.g703.map(r => r.current);
                const remaining = data.g703.map(r => r.scheduled - r.prev - r.current);

                Chart.defaults.font.family = "'Inter', sans-serif";

                window.ownerChartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'Previously Billed', data: prevBilled, backgroundColor: '#94a3b8', stack: 'Stack 0' },
                            { label: 'Billed This Period', data: currentBilled, backgroundColor: '#2563eb', stack: 'Stack 0' },
                            { label: 'Remaining Value', data: remaining, backgroundColor: '#f1f5f9', hoverBackgroundColor: '#e2e8f0', stack: 'Stack 0' }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'bottom', labels: { usePointStyle: true, padding: 15, font: { size: 11, weight: '600' } } },
                            tooltip: {
                                backgroundColor: '#0f172a', titleFont: { size: 12, weight: 'bold' }, bodyFont: { size: 12 }, padding: 10, cornerRadius: 4,
                                callbacks: { label: function(context) { return (context.dataset.label || '') + ': ' + new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(context.parsed.y); } }
                            }
                        },
                        scales: {
                            x: { stacked: true, grid: { display: false }, ticks: { font: { size: 10 }, color: '#64748b' } },
                            y: { stacked: true, beginAtZero: true, grid: { color: '#f8fafc' }, ticks: { font: { size: 10 }, color: '#64748b', callback: function(value) { return '$' + value / 1000 + 'k'; } } }
                        }
                    }
                });
            },

            renderCoordinatorChart(data) {
                const canvas = document.getElementById('coordinatorChart');
                if(!canvas) return;
                const ctx = canvas.getContext('2d');

                if (window.coordChartInstance) window.coordChartInstance.destroy();

                const labels = data.g703.map(row => row.desc.substring(0,15) + '...');
                const earnedRevenue = data.g703.map(r => r.prev + r.current);
                const actualCosts = data.g703.map(r => r.cost);

                Chart.defaults.font.family = "'Inter', sans-serif";

                window.coordChartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'Earned Revenue (SOV)', data: earnedRevenue, backgroundColor: '#10b981', borderRadius: 2 },
                            { label: 'Actual Job Costs', data: actualCosts, backgroundColor: '#8b5cf6', borderRadius: 2 }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'bottom', labels: { usePointStyle: true, padding: 15, font: { size: 11, weight: '600' } } },
                            tooltip: {
                                backgroundColor: '#0f172a', titleFont: { size: 12, weight: 'bold' }, bodyFont: { size: 12 }, padding: 10, cornerRadius: 4,
                                callbacks: { label: function(context) { return (context.dataset.label || '') + ': ' + new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(context.parsed.y); } }
                            }
                        },
                        scales: {
                            x: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#64748b' } },
                            y: { beginAtZero: true, grid: { color: '#f8fafc' }, ticks: { font: { size: 10 }, color: '#64748b', callback: function(value) { return '$' + value / 1000 + 'k'; } } }
                        }
                    }
                });
            }
        };

        // Initialize Application
        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
